<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <rect width="800" height="420" rx="12" fill="#0d1117"/>
  
  <!-- Left panel: Claude Code -->
  <rect x="20" y="20" width="310" height="380" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="20" y="20" width="310" height="36" rx="8" fill="#161b22"/>
  <rect x="20" y="48" width="310" height="8" fill="#161b22"/>
  <circle cx="38" cy="38" r="5" fill="#f85149"/>
  <circle cx="56" cy="38" r="5" fill="#d29922"/>
  <circle cx="74" cy="38" r="5" fill="#3fb950"/>
  <text x="160" y="42" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Claude Code</text>

  <text x="40" y="80" font-family="monospace" font-size="11" fill="#ff7b72">show_widget</text>
  <text x="130" y="80" font-family="monospace" font-size="11" fill="#c9d1d9">(</text>
  <text x="52" y="96" font-family="monospace" font-size="11" fill="#a5d6ff">&lt;canvas id="chart"&gt;</text>
  <text x="52" y="112" font-family="monospace" font-size="11" fill="#a5d6ff"> &lt;script src="chart.js"&gt;</text>
  <text x="52" y="128" font-family="monospace" font-size="11" fill="#a5d6ff"> &lt;script&gt;new Chart(...)</text>
  <text x="52" y="144" font-family="monospace" font-size="11" fill="#a5d6ff">&lt;/script&gt;</text>
  <text x="40" y="160" font-family="monospace" font-size="11" fill="#c9d1d9">)</text>

  <line x1="40" y1="176" x2="290" y2="176" stroke="#30363d" stroke-width="1"/>

  <!-- Streaming indicator -->
  <text x="40" y="200" font-family="monospace" font-size="11" fill="#d2a8ff">→ setContent() streaming...</text>
  <rect x="40" y="212" width="250" height="4" rx="2" fill="#21262d"/>
  <rect x="40" y="212" width="200" height="4" rx="2" fill="#a371f7" opacity="0.8"/>

  <text x="40" y="242" font-family="monospace" font-size="10" fill="#3fb950">✓ morphdom diffs DOM</text>
  <text x="40" y="258" font-family="monospace" font-size="10" fill="#3fb950">✓ 150ms debounce merge</text>
  <text x="40" y="274" font-family="monospace" font-size="10" fill="#3fb950">✓ fadeIn 0.3s animation</text>

  <text x="40" y="310" font-family="monospace" font-size="10" fill="#8b949e">WebSocket ~1ms latency</text>
  <text x="40" y="326" font-family="monospace" font-size="10" fill="#8b949e">window.widget.send(data) ↩</text>

  <!-- Arrow -->
  <line x1="340" y1="210" x2="430" y2="210" stroke="#a371f7" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="440,210 432,204 432,216" fill="#a371f7"/>

  <!-- Right panel: Widget -->
  <rect x="460" y="20" width="320" height="380" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="460" y="20" width="320" height="36" rx="8" fill="#161b22"/>
  <rect x="460" y="48" width="320" height="8" fill="#161b22"/>
  <text x="600" y="42" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">🖥 Live Widget</text>

  <text x="490" y="85" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="bold">Monthly Revenue</text>

  <!-- Y axis -->
  <text x="490" y="120" font-family="monospace" font-size="9" fill="#8b949e">100</text>
  <text x="490" y="200" font-family="monospace" font-size="9" fill="#8b949e">50</text>
  <text x="493" y="280" font-family="monospace" font-size="9" fill="#8b949e">0</text>
  <line x1="520" y1="110" x2="520" y2="275" stroke="#30363d" stroke-width="1"/>
  <line x1="520" y1="275" x2="740" y2="275" stroke="#30363d" stroke-width="1"/>

  <!-- Bars -->
  <rect x="540" y="218" width="30" height="57" rx="3" fill="#58a6ff" opacity="0.75"/>
  <rect x="580" y="172" width="30" height="103" rx="3" fill="#3fb950" opacity="0.75"/>
  <rect x="620" y="195" width="30" height="80" rx="3" fill="#58a6ff" opacity="0.75"/>
  <rect x="660" y="140" width="30" height="135" rx="3" fill="#bc8cff" opacity="0.75"/>
  <rect x="700" y="185" width="30" height="90" rx="3" fill="#3fb950" opacity="0.75"/>

  <!-- X labels -->
  <text x="555" y="292" font-family="monospace" font-size="8" fill="#8b949e">Jan</text>
  <text x="595" y="292" font-family="monospace" font-size="8" fill="#8b949e">Feb</text>
  <text x="635" y="292" font-family="monospace" font-size="8" fill="#8b949e">Mar</text>
  <text x="675" y="292" font-family="monospace" font-size="8" fill="#8b949e">Apr</text>
  <text x="715" y="292" font-family="monospace" font-size="8" fill="#8b949e">May</text>

  <!-- Interactive hint -->
  <rect x="500" y="320" width="240" height="28" rx="6" fill="#1f6feb" opacity="0.12"/>
  <rect x="500" y="320" width="240" height="28" rx="6" stroke="#1f6feb" stroke-opacity="0.25" fill="none" stroke-width="1"/>
  <text x="620" y="339" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">🖱 Click bars to filter data</text>

  <!-- Bottom label -->
  <text x="400" y="408" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#484f58">LLM generates HTML → morphdom streams it live → interactive widget renders in real-time</text>
</svg>
