<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="chart1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="chart2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="chart3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#d2a8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d2a8ff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#bc8cff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="url(#bg)"/>

  <!-- Left panel: LLM / Code -->
  <rect x="20" y="20" width="310" height="380" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="20" y="20" width="310" height="36" rx="8" fill="#161b22"/>
  <rect x="20" y="48" width="310" height="8" fill="#161b22"/>
  <circle cx="38" cy="38" r="5" fill="#f85149"/>
  <circle cx="56" cy="38" r="5" fill="#d29922"/>
  <circle cx="74" cy="38" r="5" fill="#3fb950"/>
  <text x="160" y="42" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">Claude Code</text>

  <!-- Code lines -->
  <text x="40" y="80" font-family="monospace" font-size="11" fill="#8b949e">
    <tspan fill="#ff7b72">show_widget</tspan><tspan fill="#c9d1d9">(</tspan>
  </text>
  <text x="52" y="96" font-family="monospace" font-size="11" fill="#a5d6ff">'&lt;canvas id="chart"&gt;&lt;/canvas&gt;</tspan>
  </text>
  <text x="52" y="112" font-family="monospace" font-size="11" fill="#a5d6ff"> &lt;script src="chart.js"&gt;</tspan>
  </text>
  <text x="52" y="128" font-family="monospace" font-size="11" fill="#a5d6ff"> &lt;script&gt;new Chart(...)'</tspan>
  <text x="40" y="144" font-family="monospace" font-size="11" fill="#c9d1d9">)</text>

  <!-- Divider -->
  <line x1="40" y1="160" x2="290" y2="160" stroke="#30363d" stroke-width="1"/>

  <!-- Streaming indicator -->
  <text x="40" y="185" font-family="monospace" font-size="11" fill="#d2a8ff">→ setContent() streaming...</text>
  <rect x="40" y="200" width="250" height="4" rx="2" fill="#21262d"/>
  <rect x="40" y="200" width="160" height="4" rx="2" fill="url(#accent)" opacity="0.8">
    <animate attributeName="width" values="40;250;40" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- morphdom note -->
  <text x="40" y="230" font-family="monospace" font-size="10" fill="#3fb950">✓ morphdom diffs DOM</text>
  <text x="40" y="246" font-family="monospace" font-size="10" fill="#3fb950">✓ 150ms debounce merge</text>
  <text x="40" y="262" font-family="monospace" font-size="10" fill="#3fb950">✓ fadeIn 0.3s animation</text>

  <text x="40" y="295" font-family="monospace" font-size="10" fill="#8b949e">WebSocket ~1ms latency</text>
  <text x="40" y="311" font-family="monospace" font-size="10" fill="#8b949e">window.widget.send(data) ↩</text>

  <!-- Streaming arrow -->
  <g filter="url(#glow)">
    <line x1="340" y1="210" x2="440" y2="210" stroke="url(#arrowGrad)" stroke-width="2" stroke-dasharray="6,3">
      <animate attributeName="stroke-dashoffset" values="0;-27" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <polygon points="440,210 432,204 432,216" fill="#58a6ff"/>
  </g>

  <!-- Right panel: Live Widget -->
  <rect x="460" y="20" width="320" height="380" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="460" y="20" width="320" height="36" rx="8" fill="#161b22"/>
  <rect x="460" y="48" width="320" height="8" fill="#161b22"/>
  <text x="600" y="42" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">🖥 Live Widget</text>

  <!-- Widget content: bar chart -->
  <text x="490" y="85" font-family="monospace" font-size="10" fill="#58a6ff" font-weight="bold">Monthly Revenue</text>

  <!-- Y axis labels -->
  <text x="490" y="120" font-family="monospace" font-size="9" fill="#8b949e">100</text>
  <text x="490" y="200" font-family="monospace" font-size="9" fill="#8b949e">50</text>
  <text x="493" y="280" font-family="monospace" font-size="9" fill="#8b949e">0</text>

  <!-- Y axis line -->
  <line x1="520" y1="110" x2="520" y2="275" stroke="#30363d" stroke-width="1"/>

  <!-- X axis line -->
  <line x1="520" y1="275" x2="740" y2="275" stroke="#30363d" stroke-width="1"/>

  <!-- Bars with animation -->
  <rect x="540" y="218" width="30" height="57" rx="3" fill="url(#chart1)">
    <animate attributeName="height" values="0;57" dur="1s" fill="freeze"/>
    <animate attributeName="y" values="275;218" dur="1s" fill="freeze"/>
  </rect>
  <rect x="580" y="172" width="30" height="103" rx="3" fill="url(#chart2)">
    <animate attributeName="height" values="0;103" dur="1s" fill="freeze"/>
    <animate attributeName="y" values="275;172" dur="1s" fill="freeze"/>
  </rect>
  <rect x="620" y="195" width="30" height="80" rx="3" fill="url(#chart1)">
    <animate attributeName="height" values="0;80" dur="1s" fill="freeze"/>
    <animate attributeName="y" values="275;195" dur="1s" fill="freeze"/>
  </rect>
  <rect x="660" y="140" width="30" height="135" rx="3" fill="url(#chart3)">
    <animate attributeName="height" values="0;135" dur="1s" fill="freeze"/>
    <animate attributeName="y" values="275;140" dur="1s" fill="freeze"/>
  </rect>
  <rect x="700" y="185" width="30" height="90" rx="3" fill="url(#chart2)">
    <animate attributeName="height" values="0;90" dur="1s" fill="freeze"/>
    <animate attributeName="y" values="275;185" dur="1s" fill="freeze"/>
  </rect>

  <!-- X labels -->
  <text x="555" y="292" font-family="monospace" font-size="8" fill="#8b949e">Jan</text>
  <text x="595" y="292" font-family="monospace" font-size="8" fill="#8b949e">Feb</text>
  <text x="635" y="292" font-family="monospace" font-size="8" fill="#8b949e">Mar</text>
  <text x="675" y="292" font-family="monospace" font-size="8" fill="#8b949e">Apr</text>
  <text x="715" y="292" font-family="monospace" font-size="8" fill="#8b949e">May</text>

  <!-- Interactive hint -->
  <rect x="500" y="320" width="240" height="28" rx="6" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <text x="620" y="339" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">🖱 Click bars to filter data</text>

  <!-- Bottom label -->
  <text x="400" y="408" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#484f58">LLM generates HTML → morphdom streams it live → interactive widget renders in real-time</text>
</svg>
